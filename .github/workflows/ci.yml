name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        # Informational only for now: 19 pre-existing type errors predate this
        # workflow (next.config.ts, GhostStage.tsx, Rooms canvas components,
        # etc.) and aren't part of this change. Flip to blocking once those
        # are cleaned up — tracked as a separate follow-up, not fixed here.
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Start server
        run: nohup npm run start -- -p 3000 > server.log 2>&1 &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Smoke test
        run: node scripts/smoke-test.js http://localhost:3000

      - name: Song page consistency audit
        run: node scripts/audit-song-pages.js --strict

      - name: Theme contrast audit
        run: node scripts/check-theme-contrast.js --strict

      - name: Server logs (on failure)
        if: failure()
        run: cat server.log || true
